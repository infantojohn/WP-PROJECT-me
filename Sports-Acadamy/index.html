    <script>
        const videos = [
            "videos/video1.mp4",
            "videos/video2.mp4",
            "videos/video3.mp4"
        ];

        let index = 0;
        const videoElement = document.getElementById("bgVideo");

        videoElement.addEventListener("ended", function () {

            index++;

            if (index >= videos.length) {
                index = 0;
            }

            videoElement.src = videos[index];
            videoElement.play();

        });
    </script>
